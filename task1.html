<!DOCTYPE html>
<html>
<head>
<title>Password Strength Analyzer</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}


.container{

    background:white;
    padding:30px;
    width:400px;
    border-radius:10px;
    box-shadow:0 0 10px gray;

}


h2{
    text-align:center;
}


input{

    width:100%;
    padding:12px;
    margin-top:15px;
    font-size:16px;

}


button{

    width:100%;
    padding:12px;
    margin-top:15px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;

}


button:hover{

    background:#0056b3;

}


#result{

    margin-top:20px;
    font-size:18px;

}


ul{

    color:#555;

}


</style>

</head>


<body>


<div class="container">


<h2>Password Strength Analyzer</h2>


<input 
type="password"
id="password"
placeholder="Enter your password"
>


<button onclick="checkPassword()">
Check Strength
</button>


<div id="result"></div>


<button onclick="generatePassword()">
Suggest Strong Password
</button>


<div id="suggestion"></div>


</div>



<script>


function checkPassword(){


let password =
document.getElementById("password").value;


let score=0;

let feedback=[];


// Length

if(password.length>=12){

score+=2;

}
else{

feedback.push("Use minimum 12 characters");

}



// Uppercase

if(/[A-Z]/.test(password)){

score++;

}
else{

feedback.push("Add uppercase letters");

}



// Lowercase

if(/[a-z]/.test(password)){

score++;

}
else{

feedback.push("Add lowercase letters");

}



// Numbers

if(/[0-9]/.test(password)){

score++;

}
else{

feedback.push("Add numbers");

}



// Special characters

if(/[!@#$%^&*]/.test(password)){

score++;

}
else{

feedback.push("Add special characters");

}



// Common passwords

let common=[

"password",
"123456",
"admin",
"qwerty"

];


if(common.includes(password.toLowerCase())){

score=0;

feedback.push("Avoid common passwords");

}




let strength;


if(score<=3){

strength="Weak";

}

else if(score<=5){

strength="Medium";

}

else{

strength="Strong";

}



document.getElementById("result").innerHTML=


`
<h3>Strength : ${strength}</h3>

<h4>Suggestions:</h4>

<ul>

${feedback.map(x=>`<li>${x}</li>`).join("")}

</ul>

`;



}





function generatePassword(){


let chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";


let password="";


for(let i=0;i<16;i++){


password += 
chars.charAt(
Math.floor(Math.random()*chars.length)
);


}



document.getElementById("suggestion").innerHTML=


`
<h3>Suggested Password:</h3>

<p>${password}</p>

`;



}



</script>


</body>

</html>
